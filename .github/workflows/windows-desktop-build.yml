name: Windows Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
    branches:
      - main
      - master
      - dev

jobs:
  build-windows:
    name: Build Tauri Windows app
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate Tauri assets
        shell: pwsh
        run: |
          $configBytes = [System.IO.File]::ReadAllBytes("src-tauri/tauri.conf.json")
          if ($configBytes[0] -eq 0xEF -and $configBytes[1] -eq 0xBB -and $configBytes[2] -eq 0xBF) {
            throw "src-tauri/tauri.conf.json must be UTF-8 without BOM."
          }
          Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json | Out-Null

          $iconPath = "src-tauri/icons/icon.ico"
          if (-not (Test-Path $iconPath)) {
            throw "$iconPath is required for Windows builds."
          }

          $iconBytes = [System.IO.File]::ReadAllBytes($iconPath)
          $entryBitCount = [BitConverter]::ToUInt16($iconBytes, 12)
          $firstImageOffset = [int][BitConverter]::ToUInt32($iconBytes, 18)
          $dibBitCount = [BitConverter]::ToUInt16($iconBytes, $firstImageOffset + 14)
          if ($entryBitCount -ne 32 -or $dibBitCount -ne 32) {
            throw "Windows icon must be a 32-bit ICO. Found entry=$entryBitCount dib=$dibBitCount."
          }

      - name: Run unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Print Tauri environment
        run: npx tauri info

      - name: Build Windows desktop executable
        run: npx tauri build --no-bundle

      - name: Build Windows installer
        run: npx tauri build --bundles nsis
        continue-on-error: true

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: mushroomlearning-windows-exe
          path: |
            src-tauri/target/release/*.exe
          if-no-files-found: error

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mushroomlearning-windows-installer
          path: |
            src-tauri/target/release/bundle/**/*
          if-no-files-found: ignore
