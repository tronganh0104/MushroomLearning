name: Windows Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
    branches:
      - main
      - master
      - dev

jobs:
  build-windows:
    name: Build Tauri Windows app
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Print Tauri environment
        run: npx tauri info

      - name: Build Windows desktop executable
        run: npx tauri build --no-bundle

      - name: Build Windows installer
        run: npx tauri build --bundles nsis
        continue-on-error: true

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: mushroomlearning-windows-exe
          path: |
            src-tauri/target/release/*.exe
          if-no-files-found: error

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mushroomlearning-windows-installer
          path: |
            src-tauri/target/release/bundle/**/*
          if-no-files-found: ignore
